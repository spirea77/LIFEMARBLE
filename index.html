<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생 마블 - 팀워크 에디션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy-deep: #070d24; --navy-base: #0b1333; --navy-mid: #0f1a42;
  --navy-light: #1a2755; --navy-line: #1e2f63; --beige: #c4a882;
}

body { font-family: 'Noto Sans KR', sans-serif; background: #f8f9fa; color: var(--navy-mid); }

/* ──────── SETUP ──────── */
#setup { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; background: #fff; }
.setup-hero { text-align: center; margin-bottom: 30px; }
.setup-hero h1 { font-size: 2.5rem; font-weight: 900; color: var(--navy-mid); }
.setup-hero h1 span { color: var(--beige); }

.card { width: 100%; max-width: 600px; background: var(--navy-mid); border-radius: 12px; padding: 24px; margin-bottom: 16px; color: #fff; }
.card-label { font-size: .75rem; font-weight: 700; color: var(--beige); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.card-label::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.1); }

.add-form { display: flex; gap: 8px; margin-bottom: 15px; }
.add-form input { flex: 1; padding: 12px; background: var(--navy-light); border: 1px solid var(--navy-line); border-radius: 6px; color: #fff; outline: none; }
.add-form button { padding: 0 20px; background: var(--beige); color: var(--navy-deep); border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }

.player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.player-item { display: flex; align-items: center; gap: 10px; background: var(--navy-light); padding: 8px 12px; border-radius: 6px; }
.token-dot { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; color: #fff; }

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-opt { display: none; }
.mode-label { display: flex; flex-direction: column; align-items: center; padding: 15px; border: 1px solid var(--navy-line); border-radius: 8px; cursor: pointer; background: var(--navy-light); transition: 0.2s; }
.mode-opt:checked + .mode-label { border-color: var(--beige); background: rgba(196,168,130,0.15); }

#start-btn { width: 100%; max-width: 600px; padding: 16px; background: var(--beige); color: var(--navy-deep); border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; }

/* ──────── GAME ──────── */
#game { display: none; min-height: 100vh; background: #fff; }
.game-header { background: var(--navy-mid); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
.back-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: .75rem; }

.game-body { max-width: 1200px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

/* ──────── TURN & TIMER ──────── */
.control-panel { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
.turn-card, .timer-card { background: var(--navy-mid); border-radius: 12px; padding: 18px; color: #fff; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.timer-card { justify-content: space-around; }

#timer-display { font-size: 2.2rem; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--beige); text-shadow: 0 0 10px rgba(196,168,130,0.3); }
.timer-controls { display: flex; flex-direction: column; gap: 6px; }
.t-btn { padding: 6px 14px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
.t-start { background: var(--beige); color: var(--navy-deep); }
.t-stop { background: #ff4757; color: #fff; }
.t-reset { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

/* ──────── BOARD ──────── */
.board { display: flex; flex-direction: column; gap: 4px; background: #e0e0e0; padding: 4px; border-radius: 8px; }
.board-row { display: flex; gap: 4px; height: 75px; }
.cell { flex: 1; background: #fff; border-radius: 4px; display: flex; flex-direction: column; align-items: center; padding: 4px; position: relative; }
.cell-num { font-size: 0.65rem; font-weight: 900; opacity: 0.2; position: absolute; top: 4px; left: 4px; }
.cell-tokens { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; align-items: center; height: 100%; margin-top: 10px; }
.mini-p { width: 20px; height: 20px; border-radius: 4px; font-size: 0.65rem; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: all 0.4s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.dimmed { opacity: 0.15; transform: scale(0.85); filter: grayscale(40%); }

/* ──────── FOOTER & COPYRIGHT ──────── */
.footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid #eee; color: #888; width: 100%; max-width: 600px; }
.footer p { font-size: 0.7rem; line-height: 1.6; margin-bottom: 4px; }
.copy-main { font-weight: 700; color: var(--navy-mid); }
.copy-warning { color: #cc0000; font-weight: 500; font-size: 0.65rem !important; margin-top: 8px; }

/* ──────── MODAL ──────── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--navy-mid); color: #fff; padding: 35px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center; border: 1px solid var(--navy-line); }
.m-q { font-size: 1.5rem; font-weight: 700; margin: 25px 0; line-height: 1.6; word-break: keep-all; }
.m-close { width: 100%; padding: 16px; background: var(--beige); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1rem; }

@media (max-width: 768px) { .control-panel { grid-template-columns: 1fr; } .board-row { height: 65px; } }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-hero"><h1>인생 <span>마블</span></h1></div>
  <div class="card">
    <div class="card-label">플레이어 등록</div>
    <div class="add-form">
      <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="8">
      <button onclick="addPlayer()">추가</button>
    </div>
    <div id="player-list" class="player-list"></div>
  </div>
  <div class="card">
    <div class="card-label">게임 모드 선택</div>
    <div class="mode-grid">
      <div>
        <input type="radio" name="mode" id="m-shared" value="shared" checked onchange="setMode('shared')">
        <label for="m-shared" class="mode-label"><div style="font-weight:700">단체 플레이어</div><div style="font-size:0.7rem; opacity:0.6">모두가 한 위치에서 같이 이동</div></label>
      </div>
      <div>
        <input type="radio" name="mode" id="m-color" value="color" onchange="setMode('color')">
        <label for="m-color" class="mode-label"><div style="font-weight:700">개인 플레이어</div><div style="font-size:0.7rem; opacity:0.6">각자 개별적으로 이동</div></label>
      </div>
    </div>
  </div>
  <button id="start-btn" onclick="startGame()" disabled>게임 시작하기</button>

  <footer class="footer">
    <p class="copy-main">저작권: 베이직교회 | 원작: 김희윤 목사</p>
    <p>Online Version: Mina</p>
    <p>"인생마블의 풍성한 즐거움을 온라인에서도 이어가고자 제작하였습니다."</p>
    <p class="copy-warning">※ 본 콘텐츠의 무단 복제, 변형 및 재배포를 엄격히 금합니다.</p>
  </footer>
</div>

<div id="game">
  <div class="game-header">
    <div style="color:var(--beige); font-weight:900; letter-spacing:1px;">LIFE MARBLE</div>
    <button class="back-btn" onclick="goSetup()">← 처음으로</button>
  </div>
  <div class="game-body">
    <div class="control-panel">
      <div class="turn-card">
        <div id="cur-token" style="width:55px; height:55px; border-radius:10px; display:flex; align-items:center
